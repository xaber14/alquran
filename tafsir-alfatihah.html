<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tafsir Al-Fatihah – Al-Quran Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-darkest:  #054F31;
      --green-light-bg: #ECFDF3;
      --white:          #FFFFFF;
      --bg-page:        #F7F7F7;
      --text-primary:   #2A2A2A;
      --text-secondary: #5A5A5A;
      --text-disabled:  #B8B8B8;
      --stroke-soft:    #E7E7E7;
      --stroke-medium:  #B8B8B8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ─── TOOLBAR ─────────────────────────────── */
    .toolbar {
      background: var(--green-darkest);
      padding: 24px 185px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .toolbar-back {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      color: var(--white);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.36px;
    }
    .toolbar-back:hover { opacity: 0.85; }

    /* ─── MAIN ────────────────────────────────── */
    .main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 185px;
    }

    /* ─── CARD ────────────────────────────────── */
    .tafsir-card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ─── HEADER: arabic + title + meta ─────── */
    .card-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      text-align: center;
    }
    .card-arabic {
      font-family: 'Times New Roman', serif;
      font-size: 28px;
      color: var(--text-primary);
      direction: rtl;
    }
    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.44px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .card-meta .dot {
      width: 4px;
      height: 4px;
      background: var(--text-disabled);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ─── AYAT SECTION ───────────────────────── */
    .ayat-section {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .ayat-arabic-text {
      font-family: 'Times New Roman', serif;
      font-size: 48px;
      color: var(--text-primary);
      direction: rtl;
      text-align: right;
      line-height: 1.6;
      width: 100%;
    }
    .ayat-translation {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ayat-latin {
      font-size: 18px;
      font-weight: 600;
      color: var(--green-darkest);
      letter-spacing: -0.36px;
      line-height: 1.3;
    }
    .ayat-indo {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: -0.36px;
      line-height: 1.3;
    }

    /* ─── TAFSIR BOX ─────────────────────────── */
    .tafsir-box {
      border: 1px solid var(--stroke-soft);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tafsir-box-header {
      background: var(--green-light-bg);
      padding: 24px;
    }
    .tafsir-box-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.36px;
      line-height: 1.3;
    }
    .tafsir-box-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .tafsir-box-text {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.36px;
      line-height: 1.5;
    }
    .tafsir-source {
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: -0.28px;
      line-height: 1.3;
    }

    /* ─── NAVIGATION ─────────────────────────── */
    .tafsir-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .tafsir-nav-label {
      font-size: 16px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .tafsir-nav-btns {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .divider-v {
      width: 1px;
      height: 31px;
      background: var(--stroke-medium);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.28px;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      line-height: 20px;
      text-decoration: none;
      transition: transform 0.1s ease, background 0.15s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-outline {
      background: var(--white);
      color: var(--text-primary);
      border: 1px solid var(--text-secondary);
    }
    .btn-outline:hover { background: #f5f5f5; }
    .btn-outline.disabled {
      background: #F3F3F3;
      color: var(--text-disabled);
      border: none;
      cursor: default;
      transform: none;
    }

    /* ─── RESPONSIVE ─────────────────────────── */
    @media (max-width: 1100px) {
      .toolbar, .main { padding-left: 32px; padding-right: 32px; }
    }
    @media (max-width: 768px) {
      .toolbar, .main { padding-left: 20px; padding-right: 20px; }
      .toolbar { padding-top: 16px; padding-bottom: 16px; }
      .tafsir-card { padding: 24px; gap: 28px; }
      .ayat-arabic-text { font-size: 32px; }
      .main { padding-top: 24px; padding-bottom: 24px; }
    }
    @media (max-width: 480px) {
      .ayat-arabic-text { font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <a href="surat-alfatihah.html" class="toolbar-back">
    <i class="ph ph-caret-left" style="font-size:24px;line-height:1;color:white"></i>
    Kembali
  </a>
</div>

<!-- MAIN -->
<div class="main">
  <div class="tafsir-card">

    <!-- Header -->
    <div class="card-header">
      <div class="card-arabic">ٱلْفَاتِحَةِ</div>
      <div>
        <div class="card-title" id="cardTitle">Tafsir Surah Al-Fatihah</div>
        <div class="card-meta" style="justify-content:center;margin-top:8px">
          <span>Pembukaan</span>
          <span class="dot"></span>
          <span>7 Ayat</span>
          <span class="dot"></span>
          <span>Makkiyah</span>
        </div>
      </div>
    </div>

    <!-- Ayat -->
    <div class="ayat-section">
      <div class="ayat-arabic-text" id="ayatArabic"></div>
      <div class="ayat-translation">
        <div class="ayat-latin" id="ayatLatin"></div>
        <div class="ayat-indo" id="ayatIndo"></div>
      </div>
    </div>

    <!-- Tafsir Box -->
    <div class="tafsir-box">
      <div class="tafsir-box-header">
        <div class="tafsir-box-title" id="tafsirTitle"></div>
      </div>
      <div class="tafsir-box-body">
        <p class="tafsir-box-text" id="tafsirText"></p>
        <p class="tafsir-source">Sumber: Tafsir Kementerian Agama RI</p>
      </div>
    </div>

    <!-- Navigasi -->
    <div class="tafsir-nav">
      <p class="tafsir-nav-label">Baca Tafsir Ayat Lainnya</p>
      <div class="tafsir-nav-btns">
        <button class="btn btn-outline" id="btnPrev" onclick="goAyat(currentAyat - 1)">
          <i class="ph ph-caret-left" style="font-size:16px;line-height:1;color:#B8B8B8" id="prevIcon"></i>
          Ayat Sebelumnya
        </button>
        <div class="divider-v"></div>
        <button class="btn btn-outline" id="btnNext" onclick="goAyat(currentAyat + 1)">
          Ayat Selanjutnya
          <i class="ph ph-caret-right" style="font-size:16px;line-height:1;color:#2A2A2A" id="nextIcon"></i>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
/* ─── DATA AYAT AL-FATIHAH ─── */
const AYAT = [
  {
    no: 1,
    arabic: 'بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ ۝١',
    latin: 'bismillâhir-raḥmânir-raḥîm',
    indo: 'Dengan nama Allah Yang Maha Pengasih lagi Maha Penyayang.',
    tafsir: 'Aku memulai bacaan Al-Qur\'an dengan menyebut nama Allah, nama teragung bagi satu-satunya Tuhan yang patut disembah, yang memiliki seluruh sifat kesempurnaan dan tersucikan dari segala bentuk kekurangan, Yang Maha Pengasih, Pemilik dan sumber sifat kasih Yang menganugerahkan segala macam karunia, baik besar maupun kecil, kepada seluruh makhluk, Maha Penyayang Yang tiada henti memberi kasih dan kebaikan kepada orang-orang yang beriman. Memulai setiap pekerjaan dengan menyebut nama Allah (basmalah) akan mendatangkan keberkahan, dan dengan mengingat Allah dalam setiap pekerjaan, seseorang akan memiliki kekuatan spiritual untuk melakukan yang terbaik dan menghindar dari keburukan.'
  },
  {
    no: 2,
    arabic: 'اَلْحَمْدُ لِلّٰهِ رَبِّ الْعٰلَمِيْنَۙ ۝٢',
    latin: 'al-ḥamdu lillâhi rabbil-\'âlamîn',
    indo: 'Segala puji bagi Allah, Tuhan semesta alam.',
    tafsir: 'Segala pujian yang sempurna hanya milik Allah semata, bukan milik selain-Nya. Allah adalah Tuhan yang menciptakan seluruh alam semesta beserta isinya, yang memelihara dan mengurus semua makhluk-Nya dengan segala kebutuhan mereka. Dialah yang berhak mendapat pujian atas segala nikmat yang telah dilimpahkan kepada seluruh hamba-Nya. Pujian ini mencakup semua jenis pujian, baik yang diucapkan dengan lisan maupun yang tersimpan dalam hati, karena hanya Allah yang memiliki sifat-sifat kesempurnaan yang mutlak.'
  },
  {
    no: 3,
    arabic: 'الرَّحْمٰنِ الرَّحِيْمِۙ ۝٣',
    latin: 'ar-raḥmânir-raḥîm',
    indo: 'Yang Maha Pengasih lagi Maha Penyayang,',
    tafsir: 'Allah adalah Ar-Rahman, Yang Maha Pengasih, yang melimpahkan kasih sayang-Nya kepada seluruh makhluk di dunia tanpa terkecuali, baik mukmin maupun kafir, manusia maupun hewan. Dan Allah adalah Ar-Rahim, Yang Maha Penyayang, yang memberikan kasih sayang khusus kepada orang-orang beriman di akhirat kelak. Penyebutan dua sifat kasih sayang ini secara berurutan menunjukkan betapa luasnya rahmat Allah yang mencakup seluruh makhluk di segala waktu dan tempat.'
  },
  {
    no: 4,
    arabic: 'مٰلِكِ يَوْمِ الدِّيْنِۗ ۝٤',
    latin: 'mâliki yaumid-dîn',
    indo: 'Pemilik hari Pembalasan.',
    tafsir: 'Allah adalah pemilik dan penguasa tunggal pada hari kiamat, yaitu hari pembalasan seluruh amal perbuatan manusia. Pada hari itu, tidak ada seorang pun yang memiliki kekuasaan, harta, atau wewenang untuk menolong dirinya sendiri maupun orang lain kecuali atas izin Allah. Semua keputusan ada di tangan-Nya semata. Menyadari hal ini seharusnya mendorong setiap mukmin untuk mempersiapkan amal kebaikan sebagai bekal menghadapi hari yang pasti datang tersebut.'
  },
  {
    no: 5,
    arabic: 'اِيَّاكَ نَعْبُدُ وَاِيَّاكَ نَسْتَعِيْنُۗ ۝٥',
    latin: 'iyyâka na\'budu wa iyyâka nasta\'în',
    indo: 'Hanya kepada Engkaulah kami menyembah dan hanya kepada Engkaulah kami memohon pertolongan.',
    tafsir: 'Ayat ini merupakan inti dari surat Al-Fatihah dan inti dari seluruh ajaran Islam. Hanya kepada Allah semata kita beribadah, menyembah, taat, dan tunduk dengan sepenuh hati. Tidak ada sekutu bagi-Nya dalam ibadah ini. Dan hanya kepada Allah semata kita memohon pertolongan dalam segala urusan, baik urusan dunia maupun akhirat, karena Dialah satu-satunya yang mampu memberikan pertolongan sejati. Penggabungan antara ibadah dan memohon pertolongan menunjukkan bahwa manusia adalah makhluk yang lemah yang selalu membutuhkan Allah dalam setiap langkahnya.'
  },
  {
    no: 6,
    arabic: 'اِهْدِنَا الصِّرَاطَ الْمُسْتَقِيْمَۙ ۝٦',
    latin: 'ihdinash-shirâthal-mustaqîm',
    indo: 'Bimbinglah kami ke jalan yang lurus,',
    tafsir: 'Ini adalah doa paling agung yang dipanjatkan seorang hamba kepada Tuhannya. Memohon kepada Allah agar senantiasa ditunjukkan dan dibimbing ke jalan yang lurus, yaitu jalan Islam yang telah Allah ridhoi. Jalan yang lurus ini adalah jalan yang mengantarkan kepada keselamatan dan kebahagiaan di dunia dan akhirat. Doa ini dipanjatkan minimal tujuh belas kali sehari dalam setiap rakaat shalat, menunjukkan betapa manusia sangat membutuhkan hidayah dan bimbingan Allah dalam setiap aspek kehidupannya.'
  },
  {
    no: 7,
    arabic: 'صِرَاطَ الَّذِيْنَ اَنْعَمْتَ عَلَيْهِمْ ەۙ غَيْرِ الْمَغْضُوْبِ عَلَيْهِمْ وَلَا الضَّاۤلِّيْنَ ۝٧',
    latin: 'shirâthalladzîna an\'amta \'alaihim ghairil-maghdlûbi \'alaihim wa ladl-dlâllîn',
    indo: '(yaitu) jalan orang-orang yang telah Engkau beri nikmat, bukan (jalan) mereka yang dimurkai dan bukan (pula jalan) orang-orang yang sesat.',
    tafsir: 'Jalan yang lurus itu adalah jalan para nabi, shiddiqin, syuhada, dan orang-orang shalih yang telah mendapat nikmat Allah, bukan jalan orang-orang yang dimurkai Allah karena mengetahui kebenaran namun sengaja mengingkarinya, dan bukan pula jalan orang-orang yang sesat karena tidak mengetahui kebenaran atau menyimpang darinya. Ayat penutup ini mengajarkan kita untuk selalu meneladani orang-orang yang telah mendapat ridho Allah dan menjauhi perilaku yang mendatangkan murka serta kesesatan.'
  }
];

/* ─── STATE ─── */
let currentAyat = 1;

/* ─── INIT ─── */
// Baca nomor ayat dari URL param ?ayat=N
const params = new URLSearchParams(window.location.search);
const paramAyat = parseInt(params.get('ayat'));
if (paramAyat >= 1 && paramAyat <= 7) currentAyat = paramAyat;

renderAyat(currentAyat);

/* ─── RENDER ─── */
function renderAyat(n) {
  const a = AYAT[n - 1];
  if (!a) return;

  document.getElementById('cardTitle').textContent    = `Tafsir Surah Al-Fatihah`;
  document.getElementById('ayatArabic').textContent   = a.arabic;
  document.getElementById('ayatLatin').textContent    = a.latin;
  document.getElementById('ayatIndo').textContent     = a.indo;
  document.getElementById('tafsirTitle').textContent  = `Tafsir Ringkas Surat Al-Fatihah Ayat ${n}`;
  document.getElementById('tafsirText').textContent   = a.tafsir;

  document.title = `Tafsir Al-Fatihah Ayat ${n} – Al-Quran Online`;

  // update URL tanpa reload
  history.replaceState(null, '', `?ayat=${n}`);

  updateNav(n);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNav(n) {
  const btnPrev   = document.getElementById('btnPrev');
  const btnNext   = document.getElementById('btnNext');
  const prevIcon  = document.getElementById('prevIcon');
  const nextIcon  = document.getElementById('nextIcon');

  const isFirst = n <= 1;
  const isLast  = n >= 7;

  btnPrev.className = `btn btn-outline${isFirst ? ' disabled' : ''}`;
  btnPrev.disabled = isFirst;
  prevIcon.style.color = isFirst ? '#B8B8B8' : '#2A2A2A';

  btnNext.className = `btn btn-outline${isLast ? ' disabled' : ''}`;
  btnNext.disabled = isLast;
  nextIcon.style.color = isLast ? '#B8B8B8' : '#2A2A2A';
}

function goAyat(n) {
  if (n < 1 || n > 7) return;
  currentAyat = n;
  renderAyat(n);
}
</script>
</body>
</html>
