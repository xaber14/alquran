<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tafsir – Al-Quran Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/regular/style.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#054F31;--green-light:#ECFDF3;--white:#fff;--bg:#F7F7F7;
      --text:#2A2A2A;--sec:#5A5A5A;--dis:#B8B8B8;--soft:#E7E7E7;--med:#B8B8B8;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    .toolbar{background:var(--green);padding:24px 185px;display:flex;
      align-items:center;position:sticky;top:0;z-index:100}
    .toolbar-back{display:flex;align-items:center;gap:8px;cursor:pointer;
      text-decoration:none;color:#fff;font-size:18px;font-weight:600;letter-spacing:-0.36px}
    .toolbar-back:hover{opacity:.85}

    .main{max-width:1440px;margin:0 auto;padding:40px 185px}

    .loading-state{display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;padding:80px 0;color:var(--sec)}
    .spinner{width:40px;height:40px;border:3px solid var(--soft);
      border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .tafsir-card{background:#fff;border-radius:16px;padding:40px;
      display:flex;flex-direction:column;gap:40px}

    .card-header{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center}
    .card-arabic{font-family:'Times New Roman',serif;font-size:28px;color:var(--text);direction:rtl}
    .card-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.44px;line-height:1.3}
    .card-meta{display:flex;align-items:center;gap:6px;justify-content:center;
      font-size:16px;color:var(--sec);line-height:1.5;margin-top:8px}
    .card-meta .dot{width:4px;height:4px;background:var(--dis);border-radius:50%;flex-shrink:0}

    .ayat-section{display:flex;flex-direction:column;gap:40px}
    .ayat-arabic-text{font-family:'Times New Roman',serif;font-size:48px;
      color:var(--text);direction:rtl;text-align:right;line-height:1.6;width:100%}
    .ayat-translation{display:flex;flex-direction:column;gap:12px}
    .ayat-latin{font-size:18px;font-weight:600;color:var(--green);
      letter-spacing:-0.36px;line-height:1.3}
    .ayat-indo{font-size:18px;color:var(--sec);letter-spacing:-0.36px;line-height:1.3}

    .tafsir-box{border:1px solid var(--soft);border-radius:10px;overflow:hidden;
      display:flex;flex-direction:column}
    .tafsir-box-header{background:var(--green-light);padding:24px}
    .tafsir-box-title{font-size:18px;font-weight:600;color:var(--text);
      letter-spacing:-0.36px;line-height:1.3}
    .tafsir-box-body{padding:24px;display:flex;flex-direction:column;gap:16px}
    .tafsir-box-text{font-size:18px;color:var(--text);letter-spacing:-0.36px;line-height:1.5}
    .tafsir-source{font-size:14px;color:var(--sec);letter-spacing:-0.28px;line-height:1.3}

    .tafsir-nav{display:flex;flex-direction:column;align-items:center;gap:16px}
    .tafsir-nav-label{font-size:16px;color:var(--text);line-height:1.5}
    .tafsir-nav-btns{display:flex;align-items:center;gap:16px}
    .divider-v{width:1px;height:31px;background:var(--med)}
    .btn{display:inline-flex;align-items:center;gap:4px;padding:8px 12px;border-radius:8px;
      font-size:14px;font-weight:600;letter-spacing:-0.28px;cursor:pointer;border:none;
      font-family:'Inter',sans-serif;white-space:nowrap;line-height:20px;
      text-decoration:none;transition:transform .1s ease,background .15s}
    .btn:active{transform:scale(0.95)}
    .btn-outline{background:#fff;color:var(--text);border:1px solid var(--sec)}
    .btn-outline:hover{background:#f5f5f5}
    .btn-outline.disabled{background:#F3F3F3;color:var(--dis);border:none;cursor:default;transform:none}

    @media(max-width:1100px){.toolbar,.main{padding-left:32px;padding-right:32px}}
    @media(max-width:768px){
      .toolbar,.main{padding-left:20px;padding-right:20px}
      .toolbar{padding-top:16px;padding-bottom:16px}
      .tafsir-card{padding:24px;gap:28px}
      .ayat-arabic-text{font-size:32px}
      .main{padding-top:24px;padding-bottom:24px}
    }
    @media(max-width:480px){.ayat-arabic-text{font-size:26px}}
  </style>
</head>
<body>

<div class="toolbar">
  <a id="backBtn" href="#" class="toolbar-back">
    <i class="ph ph-caret-left" style="font-size:24px;line-height:1;color:white"></i>
    Kembali
  </a>
</div>

<div class="main">
  <div class="tafsir-card">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p>Memuat tafsir…</p>
    </div>
    <div id="cardContent" style="display:none;flex-direction:column;gap:40px">

        <div>
          <div class="card-title" id="cardTitle">…</div>

        </div>

        <div class="ayat-translation">

          <div class="ayat-indo" id="ayatIndo"></div>
        </div>
      </div>

      <div class="tafsir-box">

        </div>
        <div class="tafsir-box-body">

          <p class="tafsir-source">Sumber: Tafsir Kementerian Agama RI</p>
        </div>
      </div>

      <div class="tafsir-nav">
        <p class="tafsir-nav-label">Baca Tafsir Ayat Lainnya</p>
        <div class="tafsir-nav-btns">
          <button class="btn btn-outline disabled" id="btnPrev" onclick="goAyat(-1)" disabled>
            <i class="ph ph-caret-left" style="font-size:16px;line-height:1" id="prevIcon"></i>
            Ayat Sebelumnya
          </button>
          <div class="divider-v"></div>
          <button class="btn btn-outline disabled" id="btnNext" onclick="goAyat(1)" disabled>
            Ayat Selanjutnya
            <i class="ph ph-caret-right" style="font-size:16px;line-height:1" id="nextIcon"></i>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

   INIT
══════════════════════════════════════════════════ */
const params  = new URLSearchParams(window.location.search);
let suratNo   = parseInt(params.get('no'))   || 1;
let currentAyat = parseInt(params.get('ayat')) || 1;
if (suratNo<1||suratNo>114) suratNo=1;

const API = 'https://api.alquran.cloud/v1';
let ayatData = [];
let suratInfo = null;

document.getElementById('backBtn').href = `surat.html?no=${suratNo}`;

function stripBasmalah(text, surat, ayat) {
  if (ayat !== 1) return text;
  if (surat === 1 || surat === 9) return text;
  const basmalahForms = [
    'بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ',
    'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ',
    'بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ',
    'بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِیمِ',
  ];
  let result = text;
  for (const b of basmalahForms) {
    if (result.startsWith(b)) return result.slice(b.length).trim();
  }
  const m = result.match(/^(بِ?سۡ?مِ[\s\S]{0,40}?ٱ?لرَّحِ?ی?يمِ)\s*/);
  if (m) result = result.slice(m[0].length).trim();
  return result;
}

async function loadTafsir() {
  suratInfo = SURAT_INFO[suratNo-1];
  if (currentAyat<1||currentAyat>suratInfo.ayat) currentAyat=1;

  document.title = `Tafsir ${suratInfo.latin} Ayat ${currentAyat} – Al-Quran Online`;

  try {
    const [mainRes, latinRes] = await Promise.all([
      fetch(`${API}/surah/${suratNo}/editions/quran-uthmani,id.indonesian`),
      fetch(`https://cdn.jsdelivr.net/gh/fawazahmed0/quran-api@1/editions/ara-quran-la/${suratNo}.json`)
    ]);
    if(!mainRes.ok) throw new Error();
    const json = await mainRes.json();

    let latinMap = {};
    if (latinRes.ok) {
      const latinJson = await latinRes.json();
      (latinJson.chapter || []).forEach(v => { latinMap[v.verse] = v.text; });
    }

    ayatData = json.data[0].ayahs.map((a,i)=>({
      arabic : stripBasmalah(a.text, suratNo, i + 1),
      indo   : json.data[1].ayahs[i]?.text || '',
      latin  : latinMap[i + 1] || '',
    }));

    renderPage(currentAyat);

    document.getElementById('loadingState').style.display='none';
    const cc = document.getElementById('cardContent');
    cc.style.display='flex'; cc.style.flexDirection='column';

  } catch(e) {
    document.getElementById('loadingState').innerHTML=
      '<p style="color:#c00">Gagal memuat. Coba muat ulang.</p>';
  }
}

function renderPage(n) {
  currentAyat = n;
  const a = ayatData[n-1];
  if (!a) return;

  document.title=`Tafsir ${suratInfo.latin} Ayat ${n} – Al-Quran Online`;
  history.replaceState(null,'',`?no=${suratNo}&ayat=${n}`);

  document.getElementById('cardArabic').textContent = suratInfo.arab;
  document.getElementById('cardTitle').textContent  = `Tafsir Surah ${suratInfo.latin}`;
  document.getElementById('cardMeta').innerHTML     =
    `<span>${suratInfo.arti}</span><span class="dot"></span>
     <span>${suratInfo.ayat} Ayat</span><span class="dot"></span>
     <span>${suratInfo.jenis}</span>`;

  document.getElementById('ayatArabic').textContent = a.arabic;
  document.getElementById('ayatLatin').textContent  = a.latin;
  document.getElementById('ayatIndo').textContent   = a.indo;

  // Tafsir: fetch from equran.id Kemenag API
  fetchTafsir(suratNo, n);

  updateNav(n);
  window.scrollTo({top:0,behavior:'smooth'});
}

let tafsirCache = null;

async function fetchTafsir(s, a) {
  document.getElementById('tafsirTitle').textContent =
    `Tafsir Ringkas Surat ${suratInfo.latin} Ayat ${a}`;
  document.getElementById('tafsirText').textContent = 'Memuat tafsir…';

  try {
    // Cache: endpoint kembalikan semua ayat sekaligus, fetch sekali saja
    if (!tafsirCache) {
      const res = await fetch(`https://equran.id/api/v2/tafsir/${s}`);
      if(!res.ok) throw new Error();
      const json = await res.json();
      tafsirCache = json.data?.tafsir || [];
    }
    const item = tafsirCache.find(t => t.ayat === a);
    document.getElementById('tafsirText').textContent =
      item?.teks || 'Tafsir untuk ayat ini sedang tidak tersedia.';
  } catch {
    document.getElementById('tafsirText').textContent =
      'Tafsir tidak tersedia saat ini. Silakan periksa koneksi internet Anda dan coba muat ulang halaman.';
  }
}

function updateNav(n) {
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const piEl    = document.getElementById('prevIcon');
  const niEl    = document.getElementById('nextIcon');
  const isFirst = n<=1, isLast=n>=suratInfo.ayat;
  btnPrev.className=`btn btn-outline${isFirst?' disabled':''}`;
  btnPrev.disabled=isFirst; piEl.style.color=isFirst?'#B8B8B8':'#2A2A2A';
  btnNext.className=`btn btn-outline${isLast?' disabled':''}`;
  btnNext.disabled=isLast;  niEl.style.color=isLast?'#B8B8B8':'#2A2A2A';
}

function goAyat(delta) {
  const n=currentAyat+delta;
  if(n<1||n>suratInfo.ayat) return;
  renderPage(n);
}

loadTafsir();
</script>
